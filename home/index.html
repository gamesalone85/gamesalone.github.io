<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>GamesAlone18 Universe</title>

    <!-- CSS -->
    <link href="css/styles.css" rel="stylesheet">
    <link href="/header.css" rel="stylesheet"> <!-- ✅ aquí sí va -->
</head>

<body>

<!-- FONDO -->
<div class="bg-image"></div>
<div class="bg-overlay"></div>

<div class="main-content">

    <!-- ✅ HEADER DINÁMICO -->
    <div id="header"></div>

    <!-- HERO -->
    <section class="hero">
        <div class="container text-center">

            <h1>GamesAlone18 Universe</h1>

            <p class="highlight">
                +3,477 miembros ya están dentro. ¿Te unes?
            </p>

            <p class="description">
                Gaming, cultura geek y narrativa digital en expansión.
            </p>

            <div class="buttons">
                <a href="#projects" class="btn primary">Explorar</a>
                <a href="/merch/" class="btn secondary">Merch</a>
            </div>

        </div>
    </section>

    <!-- CONTENIDO -->
    <section id="projects" class="section">
        <div class="container">
            <h2>Explora el Universo</h2>
        </div>
    </section>

    <!-- ✅ FOOTER DINÁMICO -->
    <div id="footer"></div>

</div>

<!-- JS -->
<script src="js/scripts.js"></script>

<!-- HEADER LOAD -->
<script>
fetch("/header.html")
.then(res => res.text())
.then(data => {
    document.getElementById("header").innerHTML = data;
});
</script>

<!-- FOOTER LOAD -->
<script>
fetch("/footer.html")
.then(res => res.text())
.then(data => {
    document.getElementById("footer").innerHTML = data;
});
</script>

<!-- SCROLL NAV -->
<script>
window.addEventListener("scroll", function() {
  const nav = document.querySelector(".custom-navbar");
  if (!nav) return;

  if (window.scrollY > 50) {
    nav.classList.add("scrolled");
  } else {
    nav.classList.remove("scrolled");
  }
});
</script>

</body>
</html>
