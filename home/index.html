<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>GamesAlone18 Universe</title>

    <!-- Bootstrap CSS -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Bootstrap Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<!-- Tu CSS -->
<link href="css/styles.css" rel="stylesheet">

<!-- Header CSS (si lo usas separado) -->
<link href="/header.css" rel="stylesheet">
</head>

<body>

<!-- FONDO -->
<div class="bg-image"></div>
<div class="bg-overlay"></div>

<div class="main-content">

    <!-- ✅ HEADER DINÁMICO -->
    <div id="header"></div>

    <!-- HERO -->
    <!-- 🔥 CARRUSEL 3D -->
<section class="carousel-3d-section">

    <div class="carousel-3d" id="carousel3d">

        <div class="carousel-item" data-link="https://www.instagram.com/teatroemilioelindiofernandez">
            <img src="/home/img/carrusel1.jpg" alt="">
            <span>Eventos y Cultura</span>
        </div>

        <div class="carousel-item" data-link="#">
            <img src="/home/img/suscribete.jpg" alt="">
            <span>Suscríbete</span>
        </div>

        <div class="carousel-item" data-link="/merch/">
            <img src="/home/img/tienda.jpg" alt="">
            <span>Merch Oficial</span>
        </div>

        <div class="carousel-item" data-link="/zona/">
            <img src="/home/img/acceso.jpg" alt="">
            <span>Zona Exclusiva</span>
        </div>

    </div>

    <div class="carousel-controls">
        <button id="prev">&#10094;</button>
        <button id="next">&#10095;</button>
    </div>

</section>
    <section class="hero">
        <div class="container text-center">

            <h1>GamesAlone18 Universe</h1>

            <p class="highlight">
                +3,477 miembros ya están dentro. ¿Te unes?
            </p>

            <p class="description">
                Gaming, cultura geek y narrativa digital en expansión.
            </p>

            <div class="buttons">
                <a href="#projects" class="btn primary">Explorar</a>
                <a href="/merch/" class="btn secondary">Merch</a>
            </div>

        </div>
        </section>
    
    <!-- CONTENIDO -->
    <section id="projects" class="section">
        <div class="container">
            <h2>Explora el Universo</h2>
        </div>
    </section>

    <!-- ✅ FOOTER DINÁMICO -->
    <div id="footer"></div>

</div>

<!-- JS -->
<script src="js/scripts.js"></script>

<!-- HEADER LOAD -->
<script>
fetch("/header.html")
.then(res => res.text())
.then(data => {
    document.getElementById("header").innerHTML = data;
});
</script>

<!-- FOOTER LOAD -->
<script>
fetch("/footer.html")
.then(res => res.text())
.then(data => {
    document.getElementById("footer").innerHTML = data;
});
</script>

<!-- SCROLL NAV -->
<script>
window.addEventListener("scroll", function() {
  const nav = document.querySelector(".custom-navbar");
  if (!nav) return;

  if (window.scrollY > 50) {
    nav.classList.add("scrolled");
  } else {
    nav.classList.remove("scrolled");
  }
});
</script>
<!-- Bootstrap JS (OBLIGATORIO para navbar) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
