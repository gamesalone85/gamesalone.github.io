<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>GamesAlone18 Universe</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <!-- Swiper -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>

    <!-- CSS -->
    <link href="css/styles.css" rel="stylesheet">
    <link href="/header.css" rel="stylesheet">
</head>

<body>

<!-- FONDO -->
<div class="bg-image"></div>
<div class="bg-overlay"></div>

<div class="main-content">

    <!-- HEADER -->
    <div id="header"></div>

    <!-- HERO -->
    <section class="hero">
        <div class="container text-center">
            <h1>GamesAlone18 Universe</h1>

            <p class="highlight">
                +3,477 miembros ya están dentro. ¿Te unes?
            </p>

            <p class="description">
                Gaming, cultura geek y narrativa digital en expansión.
            </p>

            <div class="buttons">
                <a href="#projects" class="btn primary">Explorar</a>
                <a href="/merch/" class="btn secondary">Merch</a>
            </div>
        </div>
    </section>

    <!-- 🔥 CARRUSEL SWIPER -->
    <section class="swiper-section">
        <div class="swiper mySwiper">
            <div class="swiper-wrapper">

                <div class="swiper-slide" onclick="go('/home/')">
                    <img src="/home/img/carrusel1.jpg">
                    <span>Eventos</span>
                </div>

                <div class="swiper-slide" onclick="go('#')">
                    <img src="/home/img/suscribete.jpg">
                    <span>Suscríbete</span>
                </div>

                <div class="swiper-slide" onclick="go('/merch/')">
                    <img src="/home/img/tienda.jpg">
                    <span>Merch</span>
                </div>

                <div class="swiper-slide" onclick="go('/zona/')">
                    <img src="/home/img/acceso.jpg">
                    <span>Zona</span>
                </div>

            </div>
        </div>
    </section>

    <!-- CONTENIDO -->
    <section id="projects" class="section">
        <div class="container text-center">
            <h2>Explora el Universo</h2>
        </div>
    </section>

    <!-- FOOTER -->
    <div id="footer"></div>

</div>

<!-- JS LIBS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>

<!-- JS -->
<script src="js/scripts.js"></script>

<!-- HEADER -->
<script>
fetch("/header.html")
.then(res => res.text())
.then(data => {
    document.getElementById("header").innerHTML = data;
});
</script>

<!-- FOOTER -->
<script>
fetch("/footer.html")
.then(res => res.text())
.then(data => {
    document.getElementById("footer").innerHTML = data;
});
</script>

<!-- SCROLL NAV -->
<script>
window.addEventListener("scroll", function() {
  const nav = document.querySelector(".custom-navbar");
  if (!nav) return;

  nav.classList.toggle("scrolled", window.scrollY > 50);
});
</script>

</body>
</html>
