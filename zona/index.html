<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Zona de Códigos | GamesAlone18 Universe</title>

<meta name="description" content="Zona exclusiva de GamesAlone18 Universe para activar códigos de descuento.">
<meta name="robots" content="index,follow">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<link href="/home/css/styles.css" rel="stylesheet">
<link href="/header.css" rel="stylesheet">

<style>

body {
    font-family: 'Segoe UI', sans-serif;
}

/* Fondo original */
.bg-image {
    position: fixed;
    width: 100%;
    height: 100%;
    background: url('/home/img/bg-masthead.jpg') no-repeat center center/cover;
    z-index: -2;
}

.bg-overlay {
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
    z-index: -1;
}

.main-content {
    position: relative;
}

/* Caja códigos */
.codigo-box{
    background:#000;
    padding:40px;
    border-radius:12px;
    color:#fff;
    max-width:500px;
    margin:auto;
    text-align:center;
}

.codigo-box input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border-radius:6px;
    border:none;
}

.codigo-box button{
    width:100%;
    padding:12px;
    font-weight:bold;
}

/* Suscripción */
#suscripcionForm input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border-radius:6px;
    border:none;
}

</style>

</head>

<body>

<div class="bg-image"></div>
<div class="bg-overlay"></div>

<div class="main-content">

<div id="header"></div>

<!-- HERO -->
<section class="text-center py-5">
<div class="container">
<h1 class="text-white">Zona de Códigos</h1>
<p class="text-white-50">Activa tu código y accede a beneficios exclusivos</p>
</div>
</section>

<!-- SUSCRIPCIÓN -->
<section class="py-5">
<div class="container">

<div class="row align-items-center">

<div class="col-lg-6 mb-4">
<img src="/home/img/suscribete.jpg" class="img-fluid">
</div>

<div class="col-lg-6 text-white">

<h2>¿Ya nos sigues?</h2>
<p>Accede antes que nadie al contenido exclusivo.</p>

<form id="suscripcionForm">

<input type="email" id="emailSuscripcion" placeholder="Correo electrónico" required>

<button class="btn btn-primary w-100">Acceder</button>

<p id="respuestaSuscripcion" class="mt-3"></p>

</form>

</div>

</div>
</div>
</section>

<!-- CÓDIGOS -->
<section class="py-5">
<div class="container">

<div class="codigo-box">

<h2>Activar Código</h2>

<form id="cuponForm">

<input type="email" id="email" placeholder="Tu correo" required>

<input type="text" id="codigo" placeholder="Código" required>

<button class="btn btn-light">Activar Código</button>

</form>

<p id="resultado"></p>

</div>

</div>
</section>

</div>

<!-- JS -->

<script>

/* SUSCRIPCIÓN */
document.getElementById("suscripcionForm")
.addEventListener("submit", function(e){

e.preventDefault();

var email = document.getElementById("emailSuscripcion").value;

fetch("https://script.google.com/macros/s/AKfycbysn2gChs38t3eOk9ei7V5uD-pqWYsqx_PRBO_PHls6GITh0-9M0joejtn7yaO9zew/exec",{
method:"POST",
body:new URLSearchParams({ email: email })
});

document.getElementById("respuestaSuscripcion").innerHTML =
"✅ Revisa tu correo para acceder.";

});

/* CÓDIGOS */
document.getElementById("cuponForm")
.addEventListener("submit", function(e){

e.preventDefault();

var email = document.getElementById("email").value;
var codigo = document.getElementById("codigo").value;

fetch("https://script.google.com/macros/s/AKfycbxuTtDPbIYM1_CdcSoXWNsFoNUu_JH7_dgXoa-yBt5uCCRiBhu3NW41AT5R4AXk1d0/exec",{
method:"POST",
body:new URLSearchParams({
email: email,
codigo: codigo,
token: "GA18SECURE"
})
})
.then(res => res.text())
.then(data => {

if(data === "VALIDO"){
document.getElementById("resultado").innerHTML = "✅ Código activado.";
}
else{
document.getElementById("resultado").innerHTML = "❌ Código inválido.";
}

})
.catch(()=>{
document.getElementById("resultado").innerHTML = "⚠ Error.";
});

});

</script>

<!-- HEADER -->
<script>
fetch("/header.html")
.then(res => res.text())
.then(data => {
document.getElementById("header").innerHTML = data;
});
</script>
<!-- SCROLL NAV -->
<script>
window.addEventListener("scroll", function() {
  const nav = document.querySelector(".custom-navbar");
  if (!nav) return;

  nav.classList.toggle("scrolled", window.scrollY > 50);
});
</script>
<!-- FOOTER -->
    <div id="footer"></div>
<!-- FOOTER -->
<script>
fetch("/footer.html")
.then(res => res.text())
.then(data => {
    document.getElementById("footer").innerHTML = data;
});
</script>

</body>
</html>
