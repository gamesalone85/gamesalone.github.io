<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Zona de Códigos | GamesAlone18 Universe</title>

<link href="../gamesalone18/css/styles.css" rel="stylesheet">

<style>

.codigo-box{
background:#000;
padding:40px;
border-radius:12px;
color:#fff;
max-width:500px;
margin:auto;
text-align:center;
}

.codigo-box input{
width:100%;
padding:12px;
margin-bottom:15px;
border-radius:6px;
border:none;
}

.codigo-box button{
width:100%;
padding:12px;
font-weight:bold;
cursor:pointer;
}

#resultado{
margin-top:15px;
font-size:0.95rem;
}

</style>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-EGZ2977YBH"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-EGZ2977YBH');
</script>
  
</head>

<body>
   <!-- Navigation-->
<div id="header"></div>
 <!-- Navigation-->
<div id="header"></div>
<header class="masthead"
style="background:url('../gamesalone18/assets/img/bg-masthead.jpg') center center / cover no-repeat;">

<div class="container px-4 px-lg-5 d-flex h-100 align-items-center justify-content-center">

<div class="text-center">

<h1 class="text-white text-uppercase">
Zona de Códigos
</h1>

<h2 class="text-white-50 mt-3">
Activa aquí tu código de descuento oficial
</h2>

</div>

</div>

</header>


<section class="projects-section bg-light">

<div class="container px-4 px-lg-5">

<div class="codigo-box">

<h2>Activar Código</h2>

<p style="opacity:0.8;">
Ingresa tu correo y el código recibido.
La vigencia será de <strong>10 días</strong>.
</p>

<form id="cuponForm">

<input 
type="email" 
id="email" 
placeholder="Tu correo electrónico"
required>

<input 
type="text" 
id="codigo" 
placeholder="Código de descuento"
required>

<button type="submit">
Activar Código
</button>

</form>

<p id="resultado"></p>

</div>

</div>

</section>


<script>

document.getElementById("cuponForm")
.addEventListener("submit",function(e){

e.preventDefault();

var email = document.getElementById("email").value;
var codigo = document.getElementById("codigo").value;

fetch("https://script.google.com/macros/s/AKfycbyp4Y4J79MTtYJL0hZolPnEn-T7gCONY51UA_040-93EWJL2QnHdI_RHBhSu5r81sQ/exec",{

method:"POST",

body:new URLSearchParams({

email:email,
codigo:codigo,
token:"GA18SECURE"

})

})

.then(res=>res.text())

.then(data=>{

if(data=="VALIDO"){

document.getElementById("resultado").innerHTML=
"✅ Código activado correctamente. Revisa tu correo.";

}else if(data=="INVALIDO"){

document.getElementById("resultado").innerHTML=
"❌ Código inválido o ya utilizado.";

}else{

document.getElementById("resultado").innerHTML=
"⚠ Error de seguridad.";

}

})

.catch(error=>{

document.getElementById("resultado").innerHTML=
"⚠ Error al validar el código.";

});

});

</script>

</body>
</html>
