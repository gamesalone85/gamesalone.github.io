<input 
type="email"

name="email"
placeholder="Tu correo electrónico"
autocomplete="email"
required>

<input 
type="text"
id="codigo"
name="codigo"
placeholder="Código de descuento"

required>

Activar Código
</button>

<script>

.then(data => {
document.getElementById("footer").innerHTML = data;
});

</script>

<!-- VALIDACIÓN -->

<script>

document.getElementById("cuponForm")
.addEventListener("submit",function(e){

e.preventDefault();

var email = document.getElementById("email").value;
var codigo = document.getElementById("codigo").value;

fetch("https://script.google.com/macros/s/AKfycbyp4Y4J79MTtYJL0hZolPnEn-T7gCONY51UA_040-93EWJL2QnHdI_RHBhSu5r81sQ/exec",{

method:"POST",

body:new URLSearchParams({

email:email,
codigo:codigo,
token:"GA18SECURE"

})

})

.then(res=>res.text())

.then(data=>{

if(data=="VALIDO"){

document.getElementById("resultado").innerHTML=
"✅ Código activado correctamente. Revisa tu correo.";

}else if(data=="INVALIDO"){

document.getElementById("resultado").innerHTML=
"❌ Código inválido o ya utilizado.";

}else{

document.getElementById("resultado").innerHTML=
"⚠ Error de seguridad.";

}

})

.catch(error=>{

document.getElementById("resultado").innerHTML=
"⚠ Error al validar el código.";

});

});

</script>

<!-- HEADER SCRIPT -->

<script>

fetch("/header.html")
.then(response => response.text())
.then(data => {

document.getElementById("header").innerHTML = data;

const navbarCollapsible = document.body.querySelector('#mainNav');

if (!navbarCollapsible) return;

const navbarShrink = function () {

if (window.scrollY === 0) {
navbarCollapsible.classList.remove('navbar-shrink');
} else {
navbarCollapsible.classList.add('navbar-shrink');
}

};

navbarShrink();
document.addEventListener('scroll', navbarShrink);

});

</script>
