<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Zona de Códigos | GamesAlone18 Universe</title>

<meta name="description" content="Zona exclusiva de GamesAlone18 Universe para activar códigos de descuento.">
<meta name="robots" content="index,follow">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="/home/css/styles.css" rel="stylesheet">
<link href="/header.css" rel="stylesheet">

<style>

body {
    background: #111;
    color: #fff;
}

.codigo-box{
    background:#000;
    padding:40px;
    border-radius:12px;
    max-width:500px;
    margin:auto;
    text-align:center;
}

.codigo-box input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border-radius:6px;
    border:none;
}

.codigo-box button{
    width:100%;
    padding:12px;
    font-weight:bold;
    cursor:pointer;
}

#resultado{
    margin-top:15px;
}

</style>

</head>

<body>

<div class="main-content">

<div id="header"></div>

<!-- HERO -->
<section class="text-center py-5">
    <div class="container">
        <h1>Zona de Códigos</h1>
        <p>Activa tu código de descuento</p>
    </div>
</section>

<!-- FORMULARIO CÓDIGOS -->
<div class="container px-4 px-lg-5">
<div class="codigo-box">

<h2>Activar Código</h2>

<form id="cuponForm">

<input 
type="email"
id="email"
placeholder="Tu correo electrónico"
required>

<input
type="text"
id="codigo"
placeholder="Código de descuento"
required>

<button type="submit">
Activar Código
</button>

</form>

<p id="resultado"></p>

</div>
</div>

<script>
document.getElementById("cuponForm")
.addEventListener("submit", function(e){

    e.preventDefault();

    var email = document.getElementById("email").value;
    var codigo = document.getElementById("codigo").value;

    fetch("https://script.google.com/macros/s/AKfycbw8qL8Td7YWtF1Ni5IVg2gIcGATz3Ffxj-o1ueE6BlC99nPEy82xwlphn4usWAzb1Q/exec",{
        method:"POST",
        body:new URLSearchParams({
            email: email,
            codigo: codigo,
            token: "GA18SECURE"
        })
    })
    .then(res => res.text())
    .then(data => {

        if(data === "VALIDO"){
            document.getElementById("resultado").innerHTML =
            "✅ Código activado correctamente.";
        }
        else if(data === "INVALIDO"){
            document.getElementById("resultado").innerHTML =
            "❌ Código inválido.";
        }
        else if(data === "INVALIDO_USADO"){
            document.getElementById("resultado").innerHTML =
            "⚠ Código ya utilizado.";
        }
        else if(data === "INVALIDO_EXPIRADO"){
            document.getElementById("resultado").innerHTML =
            "⏳ Código expirado.";
        }
        else {
            document.getElementById("resultado").innerHTML =
            "⚠ Error: " + data;
        }

    })
    .catch(() => {
        document.getElementById("resultado").innerHTML =
        "⚠ Error al procesar la solicitud.";
    });

});
</script>

<!-- HEADER -->
<script>
fetch("/header.html")
.then(res => res.text())
.then(data => {
    document.getElementById("header").innerHTML = data;
});
</script>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
