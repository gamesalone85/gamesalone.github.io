<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Zona de Códigos | GamesAlone18 Universe</title>

<meta name="description" content="Zona exclusiva de GamesAlone18 Universe para activar códigos de descuento y acceder a beneficios especiales para la comunidad.">
<meta name="robots" content="index,follow">
<link rel="canonical" href="https://www.gamesalone.com/zona/">

<!-- CSS GLOBAL DEL SITIO -->
<link href="../gamesalone18/css/styles.css" rel="stylesheet">

<!-- CSS DE ESTA PÁGINA -->
<style>

.codigo-box{
background:#000;
padding:40px;
border-radius:12px;
color:#fff;
max-width:500px;
margin:auto;
text-align:center;
}

.codigo-box input{
width:100%;
padding:12px;
margin-bottom:15px;
border-radius:6px;
border:none;
}

.codigo-box button{
width:100%;
padding:12px;
font-weight:bold;
cursor:pointer;
}

#resultado{
margin-top:15px;
font-size:0.95rem;
}

/* CSS ORIGINAL DE LA ZONA */

#password{
padding:12px;
width:260px;
border-radius:6px;
border:none;
text-align:center;
}

#error{
color:red;
margin-top:10px;
}

.media-card{
background:#fff;
padding:15px;
border-radius:12px;
box-shadow:0 5px 20px rgba(0,0,0,0.1);
transition:0.3s;
}

.media-card:hover{
transform:translateY(-5px);
}

.media-card img{
width:100%;
border-radius:10px;
margin-bottom:10px;
}

</style>

<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-EGZ2977YBH"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-EGZ2977YBH');
</script>

</head>

<body>

<!-- HEADER -->
<div id="header"></div>

<header class="masthead"
style="background:url('../gamesalone18/assets/img/bg-masthead.jpg') center center / cover no-repeat;">

<div class="container px-4 px-lg-5 d-flex h-100 align-items-center justify-content-center">

<div class="text-center">

<h1 class="text-white text-uppercase">
Zona de Códigos GamesAlone18
</h1>

<h2 class="text-white-50 mt-3">
Activa aquí tu código de descuento oficial
</h2>

</div>

</div>

</header>

<section class="projects-section bg-light">

<div class="container px-4 px-lg-5">

<div class="codigo-box">

<h2>Activar Código</h2>

<p style="opacity:0.8;">
Ingresa tu correo y el código recibido.  
La vigencia del código es de <strong>10 días</strong>.
</p>

<form id="cuponForm">

<input 
type="email"
id="email"
placeholder="Tu correo electrónico"
required>

<input
type="text"
id="codigo"
placeholder="Código de descuento"
required>

<button type="submit">
Activar Código
</button>

</form>

<p id="resultado"></p>

</div>

</div>

</section>

<!-- FOOTER -->
<div id="footer"></div>

<script>
fetch("/footer.html")
.then(response => response.text())
.then(data => {
document.getElementById("footer").innerHTML = data;
});
</script>

<!-- VALIDACIÓN DEL CUPÓN -->
<script>

document.getElementById("cuponForm")
.addEventListener("submit",function(e){

e.preventDefault();

var email = document.getElementById("email").value;
var codigo = document.getElementById("codigo").value;

fetch("https://script.google.com/macros/s/AKfycbyp4Y4J79MTtYJL0hZolPnEn-T7gCONY51UA_040-93EWJL2QnHdI_RHBhSu5r81sQ/exec",{

method:"POST",

body:new URLSearchParams({
email:email,
codigo:codigo,
token:"GA18SECURE"
})

})

.then(res=>res.text())

.then(data=>{

if(data=="VALIDO"){

document.getElementById("resultado").innerHTML=
"✅ Código activado correctamente. Revisa tu correo.";

}else if(data=="INVALIDO"){

document.getElementById("resultado").innerHTML=
"❌ Código inválido o ya utilizado.";

}else{

document.getElementById("resultado").innerHTML=
"⚠ Error de seguridad.";

}

})

.catch(error=>{

document.getElementById("resultado").innerHTML=
"⚠ Error al validar el código.";

});

});

</script>

<!-- CARGAR HEADER -->
<script>
fetch("/header.html")
.then(response => response.text())
.then(data => {

document.getElementById("header").innerHTML = data;

const navbarCollapsible = document.body.querySelector('#mainNav');

if (!navbarCollapsible) return;

const navbarShrink = function () {

if (window.scrollY === 0) {
navbarCollapsible.classList.remove('navbar-shrink');
} else {
navbarCollapsible.classList.add('navbar-shrink');
}

};

navbarShrink();
document.addEventListener('scroll', navbarShrink);

});
</script>

</body>
</html>
